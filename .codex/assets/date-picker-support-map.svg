<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="2140" viewBox="0 0 1760 2140" role="img" aria-labelledby="title desc">
  <title id="title">Date picker production support map</title>
  <desc id="desc">Visual support map for the date picker architecture showing the runtime call chain, the submittedParams object path, the query string builder, and the main edit hotspots for production support.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d0d0d0" />
    </marker>
    <style>
      .bg { fill: #111111; }
      .panel { fill: #181818; stroke: #d0d0d0; stroke-width: 2; rx: 16; }
      .panelSoft { fill: #202020; stroke: #d0d0d0; stroke-width: 2; rx: 16; }
      .callout { fill: #242424; stroke: #d0d0d0; stroke-width: 2; rx: 14; }
      .accent { fill: #f8ebce; stroke: #8c2418; stroke-width: 3; rx: 14; }
      .warn { fill: #ffddb0; stroke: #8c2418; stroke-width: 3; rx: 14; }
      .title { fill: #f3f4f6; font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .section { fill: #7ee787; font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .boxTitle { fill: #7ee787; font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { fill: #f3f4f6; font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #d1d5db; font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .warnTitle { fill: #8c2418; font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .warnBody { fill: #3b2417; font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .line { stroke: #d0d0d0; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #d0d0d0; stroke-width: 2; fill: none; stroke-dasharray: 10 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1760" height="2140" />

  <text class="title" x="60" y="55">Date Picker Production Support Map</text>
  <text class="small" x="60" y="84">Use the picture first to find the right code layer fast. Then read the matching notes in DatePickerArchitecture.md.</text>

  <text class="section" x="70" y="135">Runtime Call Chain</text>

  <rect class="accent" x="60" y="155" width="560" height="150" />
  <text class="warnTitle" x="82" y="187">What `submittedParams` actually is</text>
  <text class="warnBody" x="82" y="217">It starts inside MovieSearchScreen with default begin/end dates and empty optional filters.</text>
  <text class="warnBody" x="82" y="243">No parent or sibling component injects the initial value.</text>
  <text class="warnBody" x="82" y="269">It is a `MovieSearchParams` object, not the final `/discover/movie?...` query string.</text>
  <text class="warnBody" x="82" y="295">Only Submit replaces it after draft filters are converted into final search values.</text>

  <rect class="panel" x="60" y="340" width="330" height="260" />
  <text class="boxTitle" x="82" y="370">MovieSearchScreen.tsx</text>
  <text class="body" x="82" y="400">state: `submittedParams` line 46</text>
  <text class="body" x="82" y="426">function: `handleApplyFilters` line 57</text>
  <text class="body" x="82" y="452">query: `useMovieSearchQuery(...)` line 96</text>
  <text class="small" x="82" y="488">Owns the last submitted filter object only.</text>
  <text class="small" x="82" y="510">It does not store every in-progress picker change.</text>
  <text class="small" x="82" y="532">Think of it as the sealed order form that will be</text>
  <text class="small" x="82" y="552">sent to the query layer after Submit is pressed.</text>
  <text class="small" x="82" y="576">Edit here when the final submitted payload or</text>
  <text class="small" x="82" y="596">query trigger timing looks wrong.</text>

  <rect class="panel" x="440" y="340" width="330" height="220" />
  <text class="boxTitle" x="462" y="370">HeaderMovieSearch.tsx</text>
  <text class="body" x="462" y="400">function: `registerSubmitHandler` line 46</text>
  <text class="body" x="462" y="426">function: `submitDraftFilters` line 50</text>
  <text class="body" x="462" y="452">context value built at line 62</text>
  <text class="small" x="462" y="488">Acts as the shared parent and wiring layer.</text>
  <text class="small" x="462" y="510">Edit here when the top Submit button is not</text>
  <text class="small" x="462" y="530">talking to the field section correctly.</text>

  <rect class="panel" x="820" y="320" width="380" height="300" />
  <text class="boxTitle" x="842" y="350">SubHeaderMovieSearchFields.tsx</text>
  <text class="body" x="842" y="380">draft state begins at line 248</text>
  <text class="body" x="842" y="406">const: `isYearRangeInvalid` line 365</text>
  <text class="body" x="842" y="432">function: `submitFilters` line 367</text>
  <text class="body" x="842" y="458">effect: register submit handler line 401</text>
  <text class="body" x="842" y="484">calls: `YearWheelField` lines 522 and 536</text>
  <text class="small" x="842" y="520">Owns draft years and the other draft filters.</text>
  <text class="small" x="842" y="542">This is the conversion point where draft values</text>
  <text class="small" x="842" y="562">become one final `MovieSearchParams` object.</text>
  <text class="small" x="842" y="586">Edit here when dates do not submit correctly,</text>
  <text class="small" x="842" y="606">validation is wrong, or the top button does not dim.</text>

  <rect class="accent" x="1230" y="260" width="470" height="670" />
  <text class="warnTitle" x="1252" y="292">YearWheelField.tsx</text>
  <text class="warnBody" x="1252" y="322">props lines 27-33:</text>
  <text class="warnBody" x="1276" y="346">caller contract, variant choice, begin/end role</text>
  <text class="warnBody" x="1252" y="372">helper line 36:</text>
  <text class="warnBody" x="1276" y="396">safe `buildDate` for valid month/day output</text>
  <text class="warnBody" x="1252" y="422">state lines 51-53:</text>
  <text class="warnBody" x="1276" y="446">open state plus anchored top/left coordinates</text>
  <text class="warnBody" x="1252" y="472">mode split line 54:</text>
  <text class="warnBody" x="1276" y="496">anchored tan popup vs default centered modal</text>
  <text class="warnBody" x="1252" y="522">layout inputs lines 55-56:</text>
  <text class="warnBody" x="1276" y="546">anchor measurement source and screen width</text>
  <text class="warnBody" x="1252" y="572">width lines 57-58:</text>
  <text class="warnBody" x="1276" y="596">outer shell width plus inner picker width budget</text>
  <text class="warnBody" x="1252" y="622">bounds lines 59-62:</text>
  <text class="warnBody" x="1276" y="646">minimum and maximum picker dates from years</text>
  <text class="warnBody" x="1252" y="672">conversion line 64:</text>
  <text class="warnBody" x="1276" y="696">year -&gt; real `Date` using begin/end semantics</text>
  <text class="warnBody" x="1252" y="722">working state lines 80-84:</text>
  <text class="warnBody" x="1276" y="746">draft value, opened value, concrete picker date</text>
  <text class="warnBody" x="1252" y="772">open path line 86:</text>
  <text class="warnBody" x="1276" y="796">initialize state, measure anchor, compute position</text>
  <text class="warnBody" x="1252" y="822">close/apply/cancel lines 108, 120, 125:</text>
  <text class="warnBody" x="1276" y="846">commit, confirm, or rollback the selected year</text>
  <text class="warnBody" x="1252" y="872">render lines 133-243:</text>
  <text class="warnBody" x="1276" y="896">field button, modal, backdrop, picker, actions</text>
  <text class="warnBody" x="1252" y="922">style zones 269-357:</text>
  <text class="warnBody" x="1276" y="946">tan field, popup shell, picker frame, action buttons</text>

  <path class="dash" d="M 240 305 L 240 340" />
  <path class="line" d="M 390 450 L 440 450" />
  <path class="line" d="M 770 450 L 820 450" />
  <path class="line" d="M 1200 470 L 1230 470" />

  <text class="section" x="70" y="1050">Query Execution Path</text>

  <rect class="accent" x="60" y="1070" width="650" height="120" />
  <text class="warnTitle" x="82" y="1102">Where the actual endpoint query string is created</text>
  <text class="warnBody" x="82" y="1132">`submittedParams` does not already contain `?primary_release_date.gte=...` or the full endpoint path.</text>
  <text class="warnBody" x="82" y="1158">The real query string is assembled later in `movieService.ts` by `fetchMovieSearchResults(...)`.</text>

  <rect class="panelSoft" x="60" y="1220" width="320" height="180" />
  <text class="boxTitle" x="82" y="1250">movieSearchParams.ts</text>
  <text class="body" x="82" y="1280">type: `MovieSearchParams` line 21</text>
  <text class="small" x="82" y="1316">Defines the shape of `submittedParams`.</text>
  <text class="small" x="82" y="1338">It is the typed filter bundle, not a URL.</text>
  <text class="small" x="82" y="1360">Edit here when the submitted object shape changes.</text>

  <rect class="panelSoft" x="430" y="1220" width="360" height="210" />
  <text class="boxTitle" x="452" y="1250">useMovieSearchQuery.ts</text>
  <text class="body" x="452" y="1280">function: `useMovieSearchQuery` line 84</text>
  <text class="body" x="452" y="1306">query key uses params at line 89</text>
  <text class="body" x="452" y="1332">query function calls service at line 90</text>
  <text class="small" x="452" y="1368">Receives the submitted object from the screen.</text>
  <text class="small" x="452" y="1390">This is the transport layer between page state</text>
  <text class="small" x="452" y="1410">and the actual TMDB request builder.</text>

  <rect class="panelSoft" x="840" y="1200" width="440" height="260" />
  <text class="boxTitle" x="862" y="1230">movieService.ts</text>
  <text class="body" x="862" y="1260">function: `fetchMovieSearchResults` line 90</text>
  <text class="body" x="862" y="1286">`URLSearchParams` starts at line 104</text>
  <text class="body" x="862" y="1312">adds begin/end date, genres, streamers, sort</text>
  <text class="body" x="862" y="1338">final path built at line 148</text>
  <text class="small" x="862" y="1374">This is the shipping-label printer.</text>
  <text class="small" x="862" y="1396">It turns the submitted object into</text>
  <text class="small" x="862" y="1416">`/discover/movie?...` before the request runs.</text>
  <text class="small" x="862" y="1440">Edit here when the endpoint params are wrong</text>
  <text class="small" x="862" y="1460">even though the submitted object looks correct.</text>

  <rect class="panelSoft" x="1330" y="1240" width="300" height="160" />
  <text class="boxTitle" x="1352" y="1270">endpoints.ts</text>
  <text class="body" x="1352" y="1300">const: `MOVIE_SEARCH` line 26</text>
  <text class="small" x="1352" y="1336">Defines the route segment</text>
  <text class="small" x="1352" y="1358">`/discover/movie` used by movieService.ts.</text>

  <path class="dash" d="M 225 600 L 225 1220" />
  <path class="line" d="M 380 1310 L 430 1310" />
  <path class="line" d="M 790 1320 L 840 1320" />
  <path class="line" d="M 1280 1300 L 1330 1300" />

  <text class="section" x="70" y="1510">Rules And State Ownership</text>

  <rect class="panelSoft" x="60" y="1535" width="430" height="220" />
  <text class="boxTitle" x="82" y="1565">movieSearchDates.ts</text>
  <text class="body" x="82" y="1595">const: `MIN_SEARCH_YEAR` line 15</text>
  <text class="body" x="82" y="1621">function: `getBeginDateFromYear` line 33</text>
  <text class="body" x="82" y="1647">function: `getEndDateFromYear` line 37</text>
  <text class="body" x="82" y="1673">function: `buildSearchYearOptions` line 55</text>
  <text class="small" x="82" y="1709">Edit here when defaults, min/max year, or</text>
  <text class="small" x="82" y="1731">year-to-date business rules need to change.</text>

  <rect class="panelSoft" x="550" y="1535" width="540" height="220" />
  <text class="boxTitle" x="572" y="1565">Who Owns Which State</text>
  <text class="body" x="572" y="1595">MovieSearchScreen:</text>
  <text class="body" x="720" y="1595">final submitted `MovieSearchParams` object</text>
  <text class="body" x="572" y="1621">SubHeaderMovieSearchFields:</text>
  <text class="body" x="782" y="1621">draft years and draft filters</text>
  <text class="body" x="572" y="1647">YearWheelField:</text>
  <text class="body" x="690" y="1647">temporary popup `Date` while wheel is open</text>
  <text class="body" x="572" y="1673">HeaderMovieSearch:</text>
  <text class="body" x="716" y="1673">submit wiring and disabled-state coordination</text>
  <text class="small" x="572" y="1709">This is the key mental model when debugging</text>
  <text class="small" x="572" y="1731">why a changed filter is not yet in the real request.</text>

  <rect class="panelSoft" x="1150" y="1535" width="480" height="220" />
  <text class="boxTitle" x="1172" y="1565">What Flows Through The System</text>
  <text class="body" x="1172" y="1595">User sees:</text>
  <text class="body" x="1262" y="1595">year-only buttons and anchored popup shell</text>
  <text class="body" x="1172" y="1621">Picker stores:</text>
  <text class="body" x="1282" y="1621">real JavaScript `Date` objects while open</text>
  <text class="body" x="1172" y="1647">Field layer stores:</text>
  <text class="body" x="1302" y="1647">plain year numbers in draft state</text>
  <text class="body" x="1172" y="1673">Submit sends:</text>
  <text class="body" x="1272" y="1673">one `MovieSearchParams` object upward</text>
  <text class="body" x="1172" y="1699">Service builds:</text>
  <text class="body" x="1288" y="1699">final `URLSearchParams` and endpoint path</text>
  <text class="small" x="1172" y="1731">If the object is right but the URL is wrong, debug movieService.ts next.</text>

  <path class="dash" d="M 220 1400 L 220 1535" />
  <path class="dash" d="M 1060 1460 L 1060 1535" />

  <text class="section" x="70" y="1835">Production Issue Edit Guide</text>

  <rect class="callout" x="60" y="1860" width="300" height="130" />
  <text class="boxTitle" x="82" y="1890">If popup position or size is wrong</text>
  <text class="body" x="82" y="1920">Edit `openModal` in YearWheelField.tsx</text>
  <text class="body" x="82" y="1946">line 86 and anchored shell styles</text>
  <text class="body" x="82" y="1972">around lines 269-369</text>

  <rect class="callout" x="400" y="1860" width="300" height="130" />
  <text class="boxTitle" x="422" y="1890">If submitted object is wrong</text>
  <text class="body" x="422" y="1920">Edit `submitFilters` line 367 and</text>
  <text class="body" x="422" y="1946">movieSearchDates.ts lines 33-39</text>
  <text class="body" x="422" y="1972">Then confirm handleApplyFilters line 57</text>

  <rect class="callout" x="740" y="1860" width="300" height="130" />
  <text class="boxTitle" x="762" y="1890">If URL params sent to TMDB are wrong</text>
  <text class="body" x="762" y="1920">Edit `fetchMovieSearchResults`</text>
  <text class="body" x="762" y="1946">movieService.ts lines 90-148</text>
  <text class="body" x="762" y="1972">especially `URLSearchParams` line 104</text>

  <rect class="callout" x="1080" y="1860" width="300" height="130" />
  <text class="boxTitle" x="1102" y="1890">If Submit is disabled wrongly</text>
  <text class="body" x="1102" y="1920">Edit `isYearRangeInvalid` line 365</text>
  <text class="body" x="1102" y="1946">and the register/validity effects</text>
  <text class="body" x="1102" y="1972">around lines 393-406</text>

  <rect class="warn" x="60" y="2020" width="640" height="90" />
  <text class="warnTitle" x="82" y="2052">Vendor patch safety layer</text>
  <text class="warnBody" x="82" y="2082">package.json postinstall line 35 plus patches/react-native-date-picker+5.0.13.patch line 1 keep iOS stable after reinstall.</text>

  <rect class="warn" x="760" y="2020" width="640" height="90" />
  <text class="warnTitle" x="782" y="2052">Fast diagnosis rule</text>
  <text class="warnBody" x="782" y="2082">If the UI looks right but TMDB receives the wrong params, skip the picker box and debug movieService.ts next.</text>
</svg>
