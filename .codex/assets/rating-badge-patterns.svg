<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .bg { fill: #f7f5f2; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #171717; }
      .subtitle { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #555; }
      .label { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #222; }
      .note { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #555; }
      .card { fill: #fff; stroke: #d9d5ce; stroke-width: 1.5; rx: 8; }
      .poster { fill: #2b2b30; rx: 7; }
      .poster2 { fill: #6f1d1b; rx: 7; }
      .poster3 { fill: #1f4f4b; rx: 7; }
      .poster4 { fill: #32284a; rx: 7; }
      .small { font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #666; }
      .movie { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #202020; }
      .pillText { font: 800 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #fff; }
      .imdbBox { fill: #f5c518; rx: 3; }
      .imdbText { font: 900 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111; }
      .star { fill: #f5c518; }
      .muted { fill: #efebe4; stroke: #dfd7ca; stroke-width: 1; rx: 4; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="56" y="64">Movie rating UI patterns</text>
  <text class="subtitle" x="56" y="96">How major movie sites keep ratings visible without making cards feel bulky.</text>

  <g transform="translate(56 142)">
    <rect class="card" width="250" height="245"/>
    <text class="label" x="20" y="36">IMDb style</text>
    <text class="note" x="20" y="60">Tiny icon + number, usually near text.</text>
    <rect class="poster" x="20" y="86" width="96" height="132"/>
    <text class="movie" x="134" y="106">The Card</text>
    <polygon class="star" points="143,133 148,144 160,144 151,151 155,162 143,155 132,162 136,151 127,144 139,144"/>
    <text class="movie" x="169" y="153">7.2</text>
    <text class="small" x="134" y="184">2021 • Thriller</text>
  </g>

  <g transform="translate(336 142)">
    <rect class="card" width="250" height="245"/>
    <text class="label" x="20" y="36">TMDb style</text>
    <text class="note" x="20" y="60">Round score badge, strong but busy.</text>
    <rect class="poster2" x="20" y="86" width="96" height="132"/>
    <circle cx="104" cy="203" r="26" fill="#091f2f"/>
    <circle cx="104" cy="203" r="21" fill="none" stroke="#21d07a" stroke-width="5"/>
    <text class="pillText" x="92" y="208">72</text>
    <text class="movie" x="134" y="106">Final Night</text>
    <text class="small" x="134" y="134">2025 • Action</text>
  </g>

  <g transform="translate(616 142)">
    <rect class="card" width="250" height="245"/>
    <text class="label" x="20" y="36">Letterboxd style</text>
    <text class="note" x="20" y="60">Poster stays clean; rating below or hover.</text>
    <rect class="poster3" x="20" y="86" width="96" height="132"/>
    <text class="movie" x="134" y="106">Night House</text>
    <text x="134" y="142" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" fill="#00e054">★★★★</text>
    <text x="212" y="142" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" fill="#8b8b8b">★</text>
    <text class="small" x="134" y="184">No poster overlay</text>
  </g>

  <g transform="translate(896 142)">
    <rect class="card" width="250" height="245"/>
    <text class="label" x="20" y="36">JustWatch style</text>
    <text class="note" x="20" y="60">Metadata is quiet; services get priority.</text>
    <rect class="poster4" x="20" y="86" width="96" height="132"/>
    <text class="movie" x="134" y="106">Stream Pick</text>
    <rect class="muted" x="134" y="128" width="34" height="24"/>
    <rect class="muted" x="176" y="128" width="34" height="24"/>
    <rect class="muted" x="218" y="128" width="12" height="24"/>
    <text class="small" x="134" y="184">IMDb 7.2</text>
  </g>

  <g transform="translate(56 445)">
    <text class="title" x="0" y="0" font-size="28">Best fit for your current card</text>
    <text class="subtitle" x="0" y="34">Small IMDb logo + smaller score in a dark corner pill. Visible, familiar, and it does not steal attention from the poster.</text>
    <rect class="card" x="0" y="70" width="530" height="195"/>
    <rect class="poster2" x="22" y="92" width="110" height="150"/>
    <rect x="71" y="102" width="50" height="22" fill="#111" opacity=".82" rx="11"/>
    <rect class="imdbBox" x="78" y="108" width="24" height="10"/>
    <text class="imdbText" x="80" y="116">IMDb</text>
    <text class="pillText" x="106" y="118" font-size="12">7.2</text>
    <text class="movie" x="154" y="116">Compact result card</text>
    <text class="note" x="154" y="148">Keep this treatment if the rating must live on the poster.</text>
    <text class="note" x="154" y="176">If it still feels busy, move the pill below the title instead.</text>
  </g>

  <g transform="translate(660 515)">
    <rect class="card" width="486" height="195"/>
    <text class="label" x="22" y="42">Cleaner alternative</text>
    <rect class="poster3" x="22" y="64" width="76" height="104"/>
    <text class="movie" x="120" y="86">No overlay</text>
    <rect class="imdbBox" x="120" y="108" width="35" height="16"/>
    <text class="imdbText" x="124" y="120" font-size="11">IMDb</text>
    <text class="movie" x="164" y="122" font-size="16">7.2</text>
    <text class="note" x="120" y="151">Most readable if poster art matters more than score.</text>
  </g>
</svg>
